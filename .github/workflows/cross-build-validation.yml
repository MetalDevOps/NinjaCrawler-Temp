name: Windows cross-build validation

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ninjacrawler-proxmox-validation
  cancel-in-progress: false

jobs:
  build:
    if: ${{ github.ref == 'refs/heads/main' }}
    runs-on: [self-hosted, proxmox-lxc, crossbuild, mode-ephemeral]
    timeout-minutes: 60
    env:
      WINDOWS_TARGET: x86_64-pc-windows-msvc
      CARGO_TARGET_DIR: /cache/target/ninjacrawler-validation

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify self-hosted golden toolchain
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          rustc --version
          cargo-xwin --version
          clang-18 --version
          makensis -VERSION
          pwsh -NoLogo -NoProfile -Command '$PSVersionTable.PSVersion.ToString()'
          rustup target list --installed | grep -Fx "$WINDOWS_TARGET"
          for tool in clang-cl lld-link llvm-lib llvm-rc llvm-readobj-18; do
            command -v "$tool"
          done

      - name: Install dependencies
        run: npm ci

      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content package.json -Raw | ConvertFrom-Json).version
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Build portable and NSIS
        shell: pwsh
        run: >
          pwsh -File Tools/Build-NinjaCrawler.ps1
          -Configuration Release
          -SkipLint
          -SkipTests

      - name: Generate validation changelog
        shell: pwsh
        run: |
          pwsh -File Tools/New-NinjaCrawlerChangelog.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -CurrentRef "${{ github.sha }}" `
            -CurrentTag "validation-${{ github.run_id }}" `
            -Repository "${{ github.repository }}" `
            -OutputPath "artifacts/CHANGELOG.md"

      - name: Package validation assets
        shell: pwsh
        run: >
          pwsh -File Tools/Package-NinjaCrawlerRelease.ps1
          -Version ${{ steps.version.outputs.version }}
          -TargetTriple x86_64-pc-windows-msvc
          -ChangelogPath artifacts/CHANGELOG.md
          -SkipCompanion

      - name: Reject legacy or bundled runtime artifacts
        shell: bash
        run: |
          set -euo pipefail
          if find release -maxdepth 1 -type f \( -name '*.zip' -o -name '*.msi' \) | grep -q .; then
            echo "Legacy ZIP or MSI artifact found." >&2
            exit 1
          fi
          test ! -e connectors/bootstrap
          (cd release && sha256sum --check SHA256SUMS.txt)

      - name: Upload validation artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: NinjaCrawler-${{ steps.version.outputs.version }}-cross-build-validation
          path: release/*
          if-no-files-found: error
          retention-days: 7
