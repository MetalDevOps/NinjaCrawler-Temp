name: release-pr

# Keeps a standing "release" PR open from develop -> main.
#   * On every push to develop (and on manual dispatch) it creates the PR when
#     missing, or refreshes its body with the Conventional-Commit changes that
#     are on develop but not yet on main.
#   * Merging that PR promotes develop into main, which then triggers the
#     existing release-please + Release workflows (version bump, tag, GitHub
#     Release and Windows binaries).
on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: release-pr
  cancel-in-progress: true

jobs:
  release-pr:
    name: Sync develop -> main release PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Create or update the develop -> main release PR
        env:
          # PAT so the workflow can open the promotion PR. The default
          # GITHUB_TOKEN is blocked by "Allow GitHub Actions to create and
          # approve pull requests" being disabled on the repo.
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          BASE: main
          HEAD: develop
        run: |
          set -euo pipefail
          git fetch --quiet origin "$BASE" "$HEAD"

          existing="$(gh pr list --base "$BASE" --head "$HEAD" --state open \
            --json number --jq '.[0].number' || true)"

          base_version="$(git show "origin/$BASE:package.json" | jq -r .version)"
          head_version="$(git show "origin/$HEAD:package.json" | jq -r .version)"
          oldest_version="$(printf '%s\n%s\n' "$base_version" "$head_version" | sort -V | head -n 1)"
          if [ "$head_version" != "$base_version" ] && [ "$oldest_version" = "$head_version" ]; then
            echo "Refusing to promote $HEAD version $head_version over newer $BASE version $base_version." >&2
            echo "Merge $BASE into $HEAD to preserve the release version before promotion." >&2
            exit 1
          fi

          # Release back-syncs add merge commits to develop so it inherits the
          # published versions from main. Those merges are ancestry maintenance,
          # not changes that should be promoted back to main. Close a standing PR
          # when no non-merge commits remain so an empty promotion cannot linger.
          if [ -z "$(git log --no-merges --oneline "origin/$BASE..origin/$HEAD")" ]; then
            echo "No non-merge commits on $HEAD ahead of $BASE."
            if [ -n "$existing" ]; then
              echo "Closing empty release PR #$existing"
              gh pr close "$existing" \
                --comment "Closed automatically: only release back-sync merge commits remain on \`$HEAD\`; there are no changes to promote to \`$BASE\`."
            fi
            exit 0
          fi

          body_file="$(mktemp)"
          {
            echo "## Release"
            echo
            echo "Promotes \`$HEAD\` into \`$BASE\`."
            echo "Auto-generated by the \`release-pr\` workflow and refreshed on every push to \`$HEAD\`."
            echo
            echo "## Merge method"
            echo
            echo "> [!WARNING]"
            echo "> **Do not squash.** This PR must land as a **merge commit** so Release Please can see individual \`feat\`/\`fix\` commits on \`main\` (squashed promotes stalled 0.10.0)."
            echo
            echo "How: add the **\`promote\`** label (or run the \`promote-merge\` workflow). Do not use the green merge button."
            echo
            echo "Policy: \`Tools/Get-PRMergePolicy.ps1\` · \`docs/merge-policy.md\`"
            echo
          } > "$body_file"

          # Emit one changelog section per Conventional-Commit type, if present.
          emit_section() {
            local type="$1" title="$2" lines
            lines="$(git log --no-merges --pretty=format:'%s (%h)' "origin/$BASE..origin/$HEAD" \
              | grep -E "^${type}(\(.+\))?!?: " || true)"
            if [ -n "$lines" ]; then
              echo "### $title" >> "$body_file"
              echo "$lines" | sed -E "s/^${type}(\([^)]+\))?!?: /- /" >> "$body_file"
              echo >> "$body_file"
            fi
          }

          emit_section feat "Features"
          emit_section fix "Fixes"
          emit_section refactor "Refactors"
          emit_section perf "Performance"
          emit_section docs "Docs"
          emit_section test "Tests"
          emit_section chore "Chores"

          # Catch commits that do not match a known Conventional-Commit type.
          other="$(git log --no-merges --pretty=format:'%s (%h)' "origin/$BASE..origin/$HEAD" \
            | grep -Ev '^(feat|fix|refactor|perf|docs|test|chore)(\(.+\))?!?: ' || true)"
          if [ -n "$other" ]; then
            echo "### Other" >> "$body_file"
            echo "$other" | sed -E 's/^/- /' >> "$body_file"
            echo >> "$body_file"
          fi

          title="chore: promote develop → main"

          if [ -n "$existing" ]; then
            echo "Updating existing release PR #$existing"
            gh pr edit "$existing" --title "$title" --body-file "$body_file"
          else
            echo "Creating release PR"
            gh pr create --base "$BASE" --head "$HEAD" --title "$title" --body-file "$body_file"
          fi
