name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to publish (for example, v0.1.0)
        required: true
        type: string
      sha:
        description: Commit SHA to build. Used when the tag does not exist yet (draft release).
        required: false
        type: string
      artifact_run_id:
        description: Optional prior Release run whose verified artifact should be reused
        required: false
        type: string

permissions:
  contents: read
  actions: read

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Resolve Windows release inputs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
      sha: ${{ steps.version.outputs.sha }}
      artifact: ${{ steps.artifact.outputs.name }}
      artifact_run_id: ${{ steps.artifact.outputs.run_id }}
      reuse_artifact: ${{ steps.artifact.outputs.reuse }}
    defaults:
      run:
        working-directory: .release-source

    steps:
      - name: Check out release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ inputs.sha || inputs.tag || github.ref }}
          path: .release-source
          persist-credentials: false

      - name: Validate release version
        id: version
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
            throw "Release tag '$env:RELEASE_TAG' must use the vX.Y.Z format."
          }

          $version = $Matches.version
          # Keep this validation self-contained. Recovery may inspect a historical
          # release SHA that predates helper scripts in the current workflow.
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $cargoVersion = (
            Select-String -Path src-tauri/Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"' |
              Select-Object -First 1
          ).Matches[0].Groups[1].Value
          $cargoLockContent = Get-Content src-tauri/Cargo.lock -Raw
          $cargoLockMatch = [regex]::Match(
            $cargoLockContent,
            '(?ms)^\[\[package\]\]\s*name\s*=\s*"ninjacrawler"\s*version\s*=\s*"([^"]+)"'
          )
          if (-not $cargoLockMatch.Success) {
            throw "Could not resolve the NinjaCrawler package version from src-tauri/Cargo.lock."
          }
          $cargoLockVersion = $cargoLockMatch.Groups[1].Value

          $versions = @{
            'package.json' = $packageVersion
            'src-tauri/tauri.conf.json' = $tauriVersion
            'src-tauri/Cargo.toml' = $cargoVersion
            'src-tauri/Cargo.lock' = $cargoLockVersion
          }
          foreach ($entry in $versions.GetEnumerator()) {
            if ($entry.Value -ne $version) {
              throw "$($entry.Key) has version '$($entry.Value)', expected '$version'."
            }
          }

          "tag=$env:RELEASE_TAG" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "sha=$((git rev-parse HEAD).Trim())" >> $env:GITHUB_OUTPUT

      - name: Resolve reusable build artifact
        id: artifact
        shell: bash
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          RELEASE_SHA: ${{ steps.version.outputs.sha }}
          REQUESTED_RUN_ID: ${{ inputs.artifact_run_id }}
        run: |
          set -euo pipefail
          name="NinjaCrawler-$VERSION-windows-x64-$RELEASE_SHA"
          run_id=""

          if [ -n "$REQUESTED_RUN_ID" ]; then
            if ! [[ "$REQUESTED_RUN_ID" =~ ^[0-9]+$ ]]; then
              echo "artifact_run_id must be a numeric Actions run ID." >&2
              exit 1
            fi
            count="$(gh api "repos/${{ github.repository }}/actions/runs/$REQUESTED_RUN_ID/artifacts" \
              --jq "[.artifacts[] | select(.name == \"$name\" and .expired == false)] | length")"
            if [ "$count" != "1" ]; then
              echo "Run $REQUESTED_RUN_ID does not contain one reusable artifact named $name." >&2
              exit 1
            fi
            run_id="$REQUESTED_RUN_ID"
          else
            run_id="$(gh api "repos/${{ github.repository }}/actions/artifacts?name=$name&per_page=100" \
              --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0].workflow_run.id // empty')"
          fi

          reuse=false
          if [ -n "$run_id" ]; then
            candidate="$RUNNER_TEMP/release-artifact-candidate"
            rm -rf "$candidate"
            mkdir -p "$candidate"
            valid=true
            run_json="$(gh api "repos/${{ github.repository }}/actions/runs/$run_id")"
            workflow_path="$(jq -r '.path' <<< "$run_json")"
            run_event="$(jq -r '.event' <<< "$run_json")"
            run_repository="$(jq -r '.repository.full_name' <<< "$run_json")"
            tooling_sha="$(jq -r '.head_sha' <<< "$run_json")"
            if [ "$workflow_path" != '.github/workflows/release.yml' ] ||
               [[ ! "$run_event" =~ ^(workflow_dispatch|push)$ ]] ||
               [ "$run_repository" != '${{ github.repository }}' ] ||
               [[ ! "$tooling_sha" =~ ^[0-9a-f]{40}$ ]]; then
              valid=false
            fi
            gh run download "$run_id" --repo "${{ github.repository }}" \
              --name "$name" --dir "$candidate" || valid=false
            jq -e --arg version "$VERSION" --arg sha "$RELEASE_SHA" --arg tooling "$tooling_sha" \
              '.schemaVersion == 1 and .version == $version and .releaseSha == $sha and .toolingSha == $tooling' \
              "$candidate/BUILD-PROVENANCE.json" >/dev/null || valid=false
            (cd "$candidate" && sha256sum --check SHA256SUMS.txt) || valid=false

            expected="$(printf '%s\n' \
              BUILD-PROVENANCE.json \
              CHANGELOG.md \
              "NinjaCrawler-$VERSION-windows-x64-portable.exe" \
              "NinjaCrawler-$VERSION-windows-x64-setup.exe" \
              SHA256SUMS.txt | sort)"
            actual="$(find "$candidate" -maxdepth 1 -type f -printf '%f\n' | sort)"
            if [ "$actual" != "$expected" ]; then
              valid=false
            fi

            if [ "$valid" = true ]; then
              reuse=true
              echo "Reusing verified build candidate from Release run $run_id."
            elif [ -n "$REQUESTED_RUN_ID" ]; then
              echo "The explicitly requested artifact from run $run_id failed validation." >&2
              exit 1
            else
              echo "Ignoring invalid reusable artifact from run $run_id; a new JIT build is required." >&2
              run_id=""
            fi
          fi

          if [ -z "$run_id" ]; then
            run_id="${{ github.run_id }}"
            echo "No reusable build candidate found; a new JIT build is required."
          fi

          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "run_id=$run_id" >> "$GITHUB_OUTPUT"
          echo "reuse=$reuse" >> "$GITHUB_OUTPUT"

  build:
    name: Build Windows release assets
    needs: prepare
    if: ${{ needs.prepare.outputs.reuse_artifact != 'true' }}
    runs-on: [self-hosted, proxmox-lxc, crossbuild, mode-ephemeral]
    timeout-minutes: 60
    permissions:
      contents: read
    env:
      WINDOWS_TARGET: x86_64-pc-windows-msvc
      CARGO_TARGET_DIR: /cache/target/ninjacrawler-release
    defaults:
      run:
        working-directory: .release-source

    steps:
      - name: Check out trusted release tooling
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 1
          ref: ${{ github.sha }}
          path: .release-tooling
          persist-credentials: false

      - name: Check out release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.sha }}
          path: .release-source
          persist-credentials: false

      - name: Overlay trusted release tooling
        shell: bash
        run: |
          set -euo pipefail
          for script in \
            Build-NinjaCrawler.ps1 \
            New-NinjaCrawlerChangelog.ps1 \
            Package-NinjaCrawlerRelease.ps1; do
            cp "../.release-tooling/Tools/$script" "Tools/$script"
            sha256sum "Tools/$script"
          done

      - name: Verify release checkout
        shell: bash
        env:
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RELEASE_SHA"

      - name: Verify self-hosted golden toolchain
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          rustc --version
          cargo-xwin --version
          clang-18 --version
          makensis -VERSION
          pwsh -NoLogo -NoProfile -Command '$PSVersionTable.PSVersion.ToString()'
          rustup target list --installed | grep -Fx "$WINDOWS_TARGET"
          for tool in clang-cl lld-link llvm-lib llvm-rc llvm-readobj-18; do
            command -v "$tool"
          done

      - name: Verify Linux tray bundle prerequisites
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v pkg-config >/dev/null; then
            echo "The golden image must include pkg-config and libayatana-appindicator3-dev." >&2
            exit 1
          fi
          if ! pkg-config --exists ayatana-appindicator3-0.1; then
            echo "The golden image must include libayatana-appindicator3-dev." >&2
            exit 1
          fi
          pkg-config --modversion ayatana-appindicator3-0.1
          dpkg-query --show --showformat='${Version}\n' libayatana-appindicator3-dev

      - name: Configure shared compiler cache
        shell: bash
        run: |
          set -euo pipefail
          if command -v sccache >/dev/null; then
            echo "RUSTC_WRAPPER=$(command -v sccache)" >> "$GITHUB_ENV"
            echo 'SCCACHE_DIR=/cache/sccache/ninjacrawler' >> "$GITHUB_ENV"
            sccache --show-stats
          else
            echo '::notice::sccache is not installed in the golden image; using the release Cargo target cache.'
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build Release
        shell: pwsh
        env:
          NINJACRAWLER_RELEASE_BUILD: "true"
          NINJACRAWLER_RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          NINJACRAWLER_BUILD_SHA: ${{ needs.prepare.outputs.sha }}
        run: >
          pwsh -File Tools/Build-NinjaCrawler.ps1
          -Configuration Release

      - name: Generate changelog
        shell: pwsh
        env:
          # Resolve the changelog against the commit SHA, never the tag: on the
          # draft-release path the tag does not exist yet (it is only created
          # when the release is published in the last step), so passing the tag
          # as the ref made `git rev-parse` fail and stalled the release as a
          # draft. The SHA is always present (it is the checked-out commit).
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          pwsh -File Tools/New-NinjaCrawlerChangelog.ps1 `
            -Version "${{ needs.prepare.outputs.version }}" `
            -CurrentRef "$env:RELEASE_SHA" `
            -CurrentTag "${{ needs.prepare.outputs.tag }}" `
            -Repository "${{ github.repository }}" `
            -OutputPath "artifacts/CHANGELOG.md"

      - name: Package release assets
        shell: pwsh
        run: >
          pwsh -File Tools/Package-NinjaCrawlerRelease.ps1
          -Version ${{ needs.prepare.outputs.version }}
          -TargetTriple x86_64-pc-windows-msvc
          -ChangelogPath artifacts/CHANGELOG.md
          -SkipCompanion

      - name: Record build provenance
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
          TOOLING_SHA: ${{ github.sha }}
        run: |
          [ordered]@{
            schemaVersion = 1
            version = $env:RELEASE_VERSION
            releaseSha = $env:RELEASE_SHA
            toolingSha = $env:TOOLING_SHA
          } | ConvertTo-Json | Set-Content release/BUILD-PROVENANCE.json -NoNewline

      - name: Upload release build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.prepare.outputs.artifact }}
          path: .release-source/release/*
          if-no-files-found: error
          retention-days: 30

  publish:
    name: Publish Windows release
    needs: [prepare, build]
    if: >-
      ${{
        always() &&
        needs.prepare.result == 'success' &&
        (needs.build.result == 'success' ||
         (needs.build.result == 'skipped' && needs.prepare.outputs.reuse_artifact == 'true'))
      }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
      actions: read

    steps:
      - name: Check out trusted release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ needs.prepare.outputs.sha }}
          persist-credentials: false

      - name: Download verified build artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.prepare.outputs.artifact }}
          path: release
          github-token: ${{ github.token }}
          run-id: ${{ needs.prepare.outputs.artifact_run_id }}

      - name: Verify build provenance and checksums
        shell: pwsh
        env:
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          $provenancePath = 'release/BUILD-PROVENANCE.json'
          if (-not (Test-Path -LiteralPath $provenancePath)) {
            throw 'The downloaded build artifact has no provenance record.'
          }
          $provenance = Get-Content -LiteralPath $provenancePath -Raw | ConvertFrom-Json
          if ($provenance.schemaVersion -ne 1 -or
              $provenance.version -ne $env:RELEASE_VERSION -or
              $provenance.releaseSha -ne $env:RELEASE_SHA -or
              $provenance.toolingSha -notmatch '^[0-9a-f]{40}$') {
            throw 'The downloaded build artifact does not match the requested release identity.'
          }

          Push-Location release
          try {
            & sha256sum --check SHA256SUMS.txt
            if ($LASTEXITCODE -ne 0) {
              throw 'Release artifact checksum validation failed.'
            }
          } finally {
            Pop-Location
          }
          Remove-Item -LiteralPath $provenancePath

      - name: Publish GitHub Release
        id: publish_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
          RELEASE_SHA: ${{ needs.prepare.outputs.sha }}
        run: |
          $assets = @(Get-ChildItem release -File | ForEach-Object FullName)
          if ($assets.Count -eq 0) {
            throw "No release assets were generated."
          }

          & gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            # A (draft) release already exists. Attach the binaries first, then
            # publish it last so the tag and the visible release only appear once
            # the artifacts are in place.
            & gh release upload $env:RELEASE_TAG @assets --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "GitHub Release asset upload failed."
            }

            $publishArgs = @(
              'release', 'edit', $env:RELEASE_TAG
              '--title', "NinjaCrawler $env:RELEASE_VERSION"
              '--notes-file', 'release/CHANGELOG.md'
              '--draft=false'
              '--prerelease=false'
              '--latest'
            )
            & gh @publishArgs
          } else {
            # Fallback (for example a manual tag push with no pre-created release):
            # create it already published with the assets attached.
            $arguments = @(
              'release', 'create', $env:RELEASE_TAG
              '--target', $env:RELEASE_SHA
              '--notes-file', 'release/CHANGELOG.md'
              '--title', "NinjaCrawler $env:RELEASE_VERSION"
              '--latest'
            )
            $arguments += $assets
            & gh @arguments
          }
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release publication failed."
          }

      - name: Update README release links
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_TAG: ${{ needs.prepare.outputs.tag }}
          RELEASE_VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          $branch = "automation/readme-release-$env:RELEASE_TAG"
          git fetch origin main
          git switch --force-create $branch origin/main

          & Tools/Update-NinjaCrawlerReleaseReadme.ps1 -Version $env:RELEASE_VERSION

          if (-not (git status --short -- README.md)) {
            Write-Host "README already points to $env:RELEASE_TAG."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): update download links for $env:RELEASE_TAG"

          # actions/checkout persists GITHUB_TOKEN as an extra header. Remove it
          # so this PAT-authenticated push triggers the PR validation workflows.
          git config --local --unset-all http.https://github.com/.extraheader
          gh auth setup-git
          git push --force --set-upstream origin $branch

          $pr = gh pr list --repo ${{ github.repository }} --base main --head $branch `
            --state open --json number --jq '.[0].number'
          if (-not $pr) {
            gh pr create --repo ${{ github.repository }} --base main --head $branch `
              --title "docs(readme): update download links for $env:RELEASE_TAG" `
              --body "Updates the README download links after $env:RELEASE_TAG was published and its assets became available."
            if ($LASTEXITCODE -ne 0) {
              throw "README update PR creation failed."
            }
            $pr = gh pr list --repo ${{ github.repository }} --base main --head $branch `
              --state open --json number --jq '.[0].number'
          }

          if (-not $pr) {
            throw "Could not resolve the README update PR number."
          }

          $deadline = (Get-Date).AddMinutes(20)
          do {
            $checkData = gh pr view $pr --repo ${{ github.repository }} --json statusCheckRollup |
              ConvertFrom-Json
            $checks = @($checkData.statusCheckRollup)
            $failed = @(
              $checks | Where-Object {
                $_.status -eq 'COMPLETED' -and
                $_.conclusion -notin @('SUCCESS', 'SKIPPED', 'NEUTRAL')
              }
            )
            if ($failed.Count -gt 0) {
              $names = $failed | ForEach-Object name
              throw "README update PR checks failed: $($names -join ', ')."
            }

            $pending = @($checks | Where-Object { $_.status -ne 'COMPLETED' })
            if ($checks.Count -gt 0 -and $pending.Count -eq 0) {
              break
            }
            if ((Get-Date) -ge $deadline) {
              throw "Timed out waiting for README update PR checks."
            }

            Write-Host "Waiting for README update PR checks..."
            Start-Sleep -Seconds 10
          } while ($true)

          $requiredChecks = @('Frontend quality', 'Windows cross-build')
          $completedNames = @($checks | ForEach-Object name)
          $missingChecks = @($requiredChecks | Where-Object { $_ -notin $completedNames })
          if ($missingChecks.Count -gt 0) {
            throw "README update PR is missing required checks: $($missingChecks -join ', ')."
          }

          gh pr merge $pr --repo ${{ github.repository }} --squash --delete-branch `
            --subject "docs(readme): update download links for $env:RELEASE_TAG" `
            --body "[skip ci]"
          if ($LASTEXITCODE -ne 0) {
            throw "README update PR merge failed."
          }

      - name: Reconcile recovered release PR label
        if: ${{ always() && inputs.sha != '' && steps.publish_release.outcome == 'success' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_SHA: ${{ inputs.sha }}
        run: |
          $pending = gh pr list --repo ${{ github.repository }} --base main --state closed `
            --label 'autorelease: pending' --json number,mergeCommit `
            --jq ".[] | select(.mergeCommit.oid == `"$env:RELEASE_SHA`") | .number"
          foreach ($pr in @($pending)) {
            if ($pr) {
              gh pr edit $pr --repo ${{ github.repository }} `
                --remove-label 'autorelease: pending' `
                --add-label 'autorelease: tagged'
            }
          }

      - name: Re-anchor release-please
        # The git tag now exists (the publish step above created it). The
        # release-please run triggered by the release-PR merge already opened the
        # NEXT release PR *before* this tag existed, so it lost its anchor and
        # rebuilt the changelog from the start of the project (this produced the
        # bloated PRs #47, #53 and #58). Re-running release-please does NOT
        # deflate an already-open pending release PR — only closing it and
        # regenerating does. Every package PR edits the shared release manifest,
        # so publishing either package also makes sibling release PRs stale and
        # potentially conflicting. Close all of them, then re-dispatch
        # release-please so each package PR is recreated from the new tag and
        # manifest state. Uses the PAT, like release-please.yml itself.
        if: ${{ always() && steps.publish_release.outcome == 'success' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          $stale = gh pr list --repo ${{ github.repository }} --base main --state open `
            --json number,headRefName `
            --jq '.[] | select(.headRefName | startswith("release-please--")) | .number'
          foreach ($pr in @($stale)) {
            if ($pr) {
              Write-Host "Closing stale release PR #$pr (opened before the tag existed)."
              gh pr close $pr --repo ${{ github.repository }} `
                --comment "Superseded by the release workflow: closing so release-please re-anchors on the freshly created tag instead of rebuilding the changelog from scratch."
            }
          }
          gh workflow run release-please.yml --repo ${{ github.repository }} --ref main

      - name: Back-sync published version to develop
        if: ${{ always() && steps.publish_release.outcome == 'success' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh workflow run release-back-sync.yml `
            --repo ${{ github.repository }} `
            --ref main `
            -f tag=${{ needs.prepare.outputs.tag }}

# temp-repo workflow registration (no-op)
