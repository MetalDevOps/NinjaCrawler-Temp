name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      tag:
        description: Version tag to publish (for example, v0.1.0)
        required: true
        type: string
      sha:
        description: Commit SHA to build. Used when the tag does not exist yet (draft release).
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish Windows release
    runs-on: windows-latest
    timeout-minutes: 60

    steps:
      - name: Check out release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Prefer the commit SHA (the tag may not exist yet for a draft release),
          # then the dispatch tag, then the pushed ref.
          ref: ${{ inputs.sha || inputs.tag || github.ref }}

      - name: Validate release version
        id: version
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^v(?<version>\d+\.\d+\.\d+)$') {
            throw "Release tag '$env:RELEASE_TAG' must use the vX.Y.Z format."
          }

          $version = $Matches.version
          $packageVersion = (Get-Content package.json -Raw | ConvertFrom-Json).version
          $tauriVersion = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $cargoVersion = (
            Select-String -Path src-tauri/Cargo.toml -Pattern '^version\s*=\s*"([^"]+)"' |
              Select-Object -First 1
          ).Matches[0].Groups[1].Value

          $versions = @{
            'package.json' = $packageVersion
            'src-tauri/tauri.conf.json' = $tauriVersion
            'src-tauri/Cargo.toml' = $cargoVersion
          }
          foreach ($entry in $versions.GetEnumerator()) {
            if ($entry.Value -ne $version) {
              throw "$($entry.Key) has version '$($entry.Value)', expected '$version'."
            }
          }

          "tag=$env:RELEASE_TAG" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT
          "prerelease=$($version.StartsWith('0.'))" >> $env:GITHUB_OUTPUT

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Set up Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable

      - name: Cache Rust dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          # Shared key with the CI workflow so the release reuses its warm cache.
          key: cargo-windows-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-windows-

      - name: Install dependencies
        run: npm ci

      - name: Build Release
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >
          powershell -ExecutionPolicy Bypass
          -File Tools\Build-NinjaCrawler.ps1
          -Configuration Release

      - name: Smoke test executable
        shell: pwsh
        run: >
          powershell -ExecutionPolicy Bypass
          -File Tools\SmokeTest-NinjaCrawler.ps1
          -Configuration Release

      - name: Package release assets
        shell: pwsh
        run: >
          powershell -ExecutionPolicy Bypass
          -File Tools\Package-NinjaCrawlerRelease.ps1
          -Version ${{ steps.version.outputs.version }}

      - name: Generate changelog
        shell: pwsh
        env:
          # Resolve the changelog against the commit SHA, never the tag: on the
          # draft-release path the tag does not exist yet (it is only created
          # when the release is published in the last step), so passing the tag
          # as the ref made `git rev-parse` fail and stalled the release as a
          # draft. The SHA is always present (it is the checked-out commit).
          RELEASE_SHA: ${{ inputs.sha || github.sha }}
        run: |
          powershell -ExecutionPolicy Bypass `
            -File Tools\New-NinjaCrawlerChangelog.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -CurrentRef "$env:RELEASE_SHA" `
            -CurrentTag "${{ steps.version.outputs.tag }}" `
            -Repository "${{ github.repository }}" `
            -OutputPath "release\CHANGELOG.md"

      - name: Upload release build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: NinjaCrawler-${{ steps.version.outputs.version }}-windows-x64
          path: release/*
          if-no-files-found: error
          retention-days: 30

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          IS_PRERELEASE: ${{ steps.version.outputs.prerelease }}
          RELEASE_SHA: ${{ inputs.sha || github.sha }}
        run: |
          $assets = @(Get-ChildItem release -File | ForEach-Object FullName)
          if ($assets.Count -eq 0) {
            throw "No release assets were generated."
          }

          & gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            # A (draft) release already exists. Attach the binaries first, then
            # publish it last so the tag and the visible release only appear once
            # the artifacts are in place.
            & gh release upload $env:RELEASE_TAG @assets --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "GitHub Release asset upload failed."
            }

            $publishArgs = @(
              'release', 'edit', $env:RELEASE_TAG
              '--title', "NinjaCrawler $env:RELEASE_VERSION"
              '--notes-file', 'release\CHANGELOG.md'
              '--draft=false'
            )
            if ($env:IS_PRERELEASE -eq 'True') {
              $publishArgs += '--prerelease'
            } else {
              $publishArgs += '--latest'
            }
            & gh @publishArgs
          } else {
            # Fallback (for example a manual tag push with no pre-created release):
            # create it already published with the assets attached.
            $arguments = @(
              'release', 'create', $env:RELEASE_TAG
              '--target', $env:RELEASE_SHA
              '--notes-file', 'release\CHANGELOG.md'
              '--title', "NinjaCrawler $env:RELEASE_VERSION"
            )
            if ($env:IS_PRERELEASE -eq 'True') {
              $arguments += '--prerelease'
            } else {
              $arguments += '--latest'
            }
            $arguments += $assets
            & gh @arguments
          }
          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release publication failed."
          }
