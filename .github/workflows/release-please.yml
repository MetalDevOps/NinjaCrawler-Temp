name: release-please

# Automates the release flow on every merge to main:
#   1. release-please keeps a "release PR" that bumps the version across
#      package.json / package-lock.json / tauri.conf.json / Cargo.toml and
#      updates CHANGELOG.md from the Conventional Commits since the last
#      release. Cargo.lock is derived: the sync-release-cargo-lock workflow
#      rewrites only the ninjacrawler package version from Cargo.toml on the
#      app release PR (Companion uses a separate track/manifest).
#   2. Merging that PR creates a *draft* GitHub Release (draft: true in the
#      config). A draft does not create the git tag yet, so nothing is visible.
#   3. We dispatch the Release workflow with the release tag and commit SHA. It
#      builds the Windows binaries, attaches them to the draft, and only then
#      publishes it (--draft=false) — which is what finally creates the tag. So
#      the tag and the visible release only appear once the artifacts are ready.
#
# workflow_dispatch exists so the Release workflow can re-invoke this after it
# creates the tag. Because the tag is born late (step 3), the run triggered by
# the release-PR merge tries to open the *next* release PR before the tag of the
# just-released version exists, loses its anchor and rebuilds the changelog from
# scratch (this produced the inflated PRs #47 and #53). Re-running once the tag
# exists re-anchors it and clears/regenerates that PR correctly.
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      recover_package:
        description: Recover a merged release whose manifest version has no tag
        required: false
        type: choice
        default: none
        options:
          - none
          - app
          - companion
      recover_sha:
        description: Commit SHA containing the version to recover (defaults to main)
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Check out release history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Detect unpublished draft releases
        id: unpublished
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.recover_package == 'none' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          $manifest = Get-Content .release-please-manifest.json -Raw | ConvertFrom-Json
          $releaseJson = & gh release list --repo ${{ github.repository }} `
            --limit 1000 --json tagName,isDraft
          if ($LASTEXITCODE -ne 0) {
            throw 'Could not list GitHub releases.'
          }
          $knownReleases = @($releaseJson | ConvertFrom-Json)

          function Test-UnpublishedDraft([string]$Tag) {
            $matchingTags = @(& git tag --list $Tag)
            if ($LASTEXITCODE -ne 0) {
              throw "Could not inspect git tag $Tag."
            }
            if ($matchingTags.Count -gt 0) {
              return $false
            }

            $matchingReleases = @($knownReleases | Where-Object tagName -eq $Tag)
            return $matchingReleases.Count -eq 1 -and $matchingReleases[0].isDraft
          }

          $appTag = "v$($manifest.'.')"
          $companionTag = "companion-v$($manifest.'NinjaCrawler.Companion')"
          $appBlocked = Test-UnpublishedDraft $appTag
          $companionBlocked = Test-UnpublishedDraft $companionTag

          "app=$($appBlocked.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "app_tag=$appTag" >> $env:GITHUB_OUTPUT
          "companion=$($companionBlocked.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "companion_tag=$companionTag" >> $env:GITHUB_OUTPUT

          if ($appBlocked -or $companionBlocked) {
            Write-Warning "Release Please is paused while an existing draft release is unpublished."
            $stale = gh pr list --repo ${{ github.repository }} --base main --state open `
              --json number,headRefName `
              --jq '.[] | select(.headRefName | startswith("release-please--")) | .number'
            foreach ($pr in @($stale)) {
              if ($pr) {
                gh pr close $pr --repo ${{ github.repository }} `
                  --comment "Closed automatically: a merged release is still a draft without a Git tag. Release Please remains paused until publication or explicit recovery completes."
              }
            }
          }

      - name: Recover untagged merged release
        id: recovery
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.recover_package != 'none' }}
        env:
          # Release creation and workflow dispatch need the repository PAT. The
          # default workflow token is rejected by this repository's policy.
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RECOVER_PACKAGE: ${{ inputs.recover_package }}
          RECOVER_SHA: ${{ inputs.recover_sha || github.sha }}
        run: |
          set -euo pipefail

          if [ "$RECOVER_PACKAGE" = "app" ]; then
            version="$(gh api "repos/${{ github.repository }}/contents/.release-please-manifest.json?ref=$RECOVER_SHA" --jq '.content' | base64 --decode | jq -r '.["."]')"
            tag="v$version"
            workflow="release.yml"
            title="NinjaCrawler $version"
          else
            version="$(gh api "repos/${{ github.repository }}/contents/.release-please-manifest.json?ref=$RECOVER_SHA" --jq '.content' | base64 --decode | jq -r '.["NinjaCrawler.Companion"]')"
            tag="companion-v$version"
            workflow="release-companion.yml"
            title="NinjaCrawler Companion $version"
          fi

          if gh api "repos/${{ github.repository }}/git/ref/tags/$tag" >/dev/null 2>&1; then
            echo "::error::Release tag $tag already exists; recovery is not required."
            exit 1
          fi

          if ! gh release view "$tag" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            gh release create "$tag" \
              --repo "${{ github.repository }}" \
              --target "$RECOVER_SHA" \
              --title "$title" \
              --notes "Recovery build for merged release $tag." \
              --draft
          fi

          gh workflow run "$workflow" \
            --repo "${{ github.repository }}" \
            --ref main \
            -f tag="$tag" \
            -f sha="$RECOVER_SHA"
          echo "requested=true" >> "$GITHUB_OUTPUT"

      - name: Detect Companion release intent
        id: companion_intent
        if: ${{ steps.recovery.outputs.requested != 'true' && steps.unpublished.outputs.companion != 'true' }}
        shell: pwsh
        run: |
          $tag = git tag --list 'companion-v*' --sort=-version:refname |
            Select-Object -First 1
          if (-not $tag) {
            throw "Cannot validate Companion release intent because no published Companion tag exists."
          }

          $resultJson = & Tools/Test-ReleaseCandidateIntegrity.ps1 `
            -CommitRange "$tag..HEAD"
          if ($LASTEXITCODE -ne 0) {
            throw "Companion release intent validation failed."
          }
          $result = $resultJson | ConvertFrom-Json
          $eligible = if ($result.eligible) { 'true' } else { 'false' }
          Write-Host "Companion release eligible: $eligible"
          Write-Host "Functional commits: $(@($result.functional_commits).Count)"
          "eligible=$eligible" >> $env:GITHUB_OUTPUT

      - name: Run release-please for the app
        id: app_release
        if: ${{ steps.recovery.outputs.requested != 'true' && steps.unpublished.outputs.app != 'true' }}
        uses: googleapis/release-please-action@v5
        with:
          # PAT so release-please can open its release PR. The default
          # GITHUB_TOKEN is blocked by "Allow GitHub Actions to create and
          # approve pull requests" being disabled on the repo.
          token: ${{ secrets.GH_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Close metadata-only Companion release pull requests
        if: ${{ steps.unpublished.outputs.companion != 'true' && steps.companion_intent.outputs.eligible == 'false' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          stale="$(gh pr list --repo "${{ github.repository }}" --base main --state open \
            --json number,headRefName \
            --jq '.[] | select(.headRefName == "release-please--branches--main--components--companion") | .number')"
          for pr in $stale; do
            echo "Closing metadata-only Companion release PR #$pr."
            gh pr close "$pr" --repo "${{ github.repository }}" \
              --comment "Closed automatically: no functional Companion files changed since the latest companion tag. Version metadata and changelog synchronization do not qualify as a release."
          done

      - name: Run release-please for the Companion
        id: companion_release
        if: ${{ steps.recovery.outputs.requested != 'true' && steps.unpublished.outputs.companion != 'true' && steps.companion_intent.outputs.eligible == 'true' }}
        uses: googleapis/release-please-action@v5
        with:
          token: ${{ secrets.GH_TOKEN }}
          config-file: release-please-companion-config.json
          manifest-file: .release-please-manifest.json

      - name: Validate Companion release pull request
        if: ${{ steps.recovery.outputs.requested != 'true' && steps.unpublished.outputs.companion != 'true' && steps.companion_intent.outputs.eligible == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          set -euo pipefail
          pr="$(gh pr list --repo "${{ github.repository }}" --base main --state open \
            --json number,headRefName \
            --jq '.[] | select(.headRefName == "release-please--branches--main--components--companion") | .number' \
            | head -n 1)"
          if [ -z "$pr" ]; then
            echo "No open Companion release PR to validate."
            exit 0
          fi

          body_file="$RUNNER_TEMP/companion-release-pr.md"
          gh pr view "$pr" --repo "${{ github.repository }}" --json body --jq '.body' > "$body_file"
          if ! pwsh -File Tools/Test-ReleaseCandidateIntegrity.ps1 \
            -PullRequestBodyPath "$body_file" -RequireFunctionalChange; then
            gh pr close "$pr" --repo "${{ github.repository }}" \
              --comment "Closed automatically: the release notes reference no commit that changes functional Companion files."
            exit 1
          fi

      - name: Quarantine pre-tag release pull requests
        if: ${{ always() && steps.recovery.outputs.requested != 'true' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          $manifest = Get-Content .release-please-manifest.json -Raw | ConvertFrom-Json
          $releaseJson = & gh release list --repo ${{ github.repository }} `
            --limit 1000 --json tagName,isDraft
          if ($LASTEXITCODE -ne 0) {
            throw 'Could not list GitHub releases.'
          }
          $knownReleases = @($releaseJson | ConvertFrom-Json)
          $tags = @(
            "v$($manifest.'.')"
            "companion-v$($manifest.'NinjaCrawler.Companion')"
          )
          $unpublished = @($tags | Where-Object {
            $tag = $_
            $matchingTags = @(& git tag --list $tag)
            if ($LASTEXITCODE -ne 0) {
              throw "Could not inspect git tag $tag."
            }
            if ($matchingTags.Count -gt 0) {
              return $false
            }
            $matchingReleases = @($knownReleases | Where-Object tagName -eq $tag)
            return $matchingReleases.Count -eq 1 -and $matchingReleases[0].isDraft
          })
          if ($unpublished.Count -eq 0) {
            Write-Host "No unpublished draft release requires PR quarantine."
            exit 0
          }

          $stale = gh pr list --repo ${{ github.repository }} --base main --state open `
            --json number,headRefName `
            --jq '.[] | select(.headRefName | startswith("release-please--")) | .number'
          foreach ($pr in @($stale)) {
            if ($pr) {
              Write-Host "Closing pre-tag release PR #$pr."
              gh pr close $pr --repo ${{ github.repository }} `
                --comment "Closed automatically: the preceding release is still an unpublished draft. A new release PR will be generated only after its Git tag exists."
            }
          }

      - name: Trigger Windows release build
        # The root package (".") keeps the unprefixed outputs.
        if: ${{ steps.app_release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh workflow run release.yml
          --repo ${{ github.repository }}
          --ref main
          -f tag=${{ steps.app_release.outputs.tag_name }}
          -f sha=${{ steps.app_release.outputs.sha }}

      - name: Trigger Companion release build
        # The Companion package uses path-prefixed outputs (<path>--...).
        if: ${{ steps.companion_release.outputs['NinjaCrawler.Companion--release_created'] == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh workflow run release-companion.yml
          --repo ${{ github.repository }}
          --ref main
          -f tag=${{ steps.companion_release.outputs['NinjaCrawler.Companion--tag_name'] }}
          -f sha=${{ steps.companion_release.outputs['NinjaCrawler.Companion--sha'] }}

      - name: Reject untagged merged release PRs
        if: ${{ steps.recovery.outputs.requested != 'true' && steps.unpublished.outputs.app != 'true' && steps.unpublished.outputs.companion != 'true' && steps.app_release.outputs.release_created != 'true' && steps.companion_release.outputs['NinjaCrawler.Companion--release_created'] != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pending="$(gh pr list \
            --repo "${{ github.repository }}" \
            --base main \
            --state closed \
            --label 'autorelease: pending' \
            --json number,mergedAt,url \
            --jq '[.[] | select(.mergedAt != null)]')"
          count="$(jq 'length' <<< "$pending")"
          if [ "$count" -gt 0 ]; then
            jq -r '.[] | "::error::Merged release PR #\(.number) is still untagged: \(.url)"' <<< "$pending"
            echo "Run this workflow manually with recover_package set to the affected package."
            exit 1
          fi

      - name: Report paused publication state
        if: ${{ steps.unpublished.outputs.app == 'true' || steps.unpublished.outputs.companion == 'true' }}
        run: |
          echo "::warning::Release Please is paused until the draft release is published or recovered. App=${{ steps.unpublished.outputs.app_tag }}, Companion=${{ steps.unpublished.outputs.companion_tag }}."
