name: release-please

# Automates the release flow on every merge to main:
#   1. release-please keeps a "release PR" that bumps the version across
#      package.json / package-lock.json / tauri.conf.json / Cargo.toml and
#      updates CHANGELOG.md from the Conventional Commits since the last release.
#   2. Merging that PR creates a *draft* GitHub Release (draft: true in the
#      config). A draft does not create the git tag yet, so nothing is visible.
#   3. We dispatch the Release workflow with the release tag and commit SHA. It
#      builds the Windows binaries, attaches them to the draft, and only then
#      publishes it (--draft=false) — which is what finally creates the tag. So
#      the tag and the visible release only appear once the artifacts are ready.
#
# workflow_dispatch exists so the Release workflow can re-invoke this after it
# creates the tag. Because the tag is born late (step 3), the run triggered by
# the release-PR merge tries to open the *next* release PR before the tag of the
# just-released version exists, loses its anchor and rebuilds the changelog from
# scratch (this produced the inflated PRs #47 and #53). Re-running once the tag
# exists re-anchors it and clears/regenerates that PR correctly.
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Run release-please
        id: release
        uses: googleapis/release-please-action@v5
        with:
          # PAT so release-please can open its release PR. The default
          # GITHUB_TOKEN is blocked by "Allow GitHub Actions to create and
          # approve pull requests" being disabled on the repo.
          token: ${{ secrets.GH_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - name: Trigger Windows release build
        if: ${{ steps.release.outputs.release_created == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh workflow run release.yml
          --repo ${{ github.repository }}
          --ref main
          -f tag=${{ steps.release.outputs.tag_name }}
          -f sha=${{ steps.release.outputs.sha }}
