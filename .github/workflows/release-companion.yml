name: Release Companion

# Publishes the Chrome Companion extension on its own release-please track. The
# Companion is versioned independently of the desktop app (tag companion-vX.Y.Z)
# so a release that only touches the app never bumps the extension — which would
# otherwise make the in-app update check nag users to reinstall an unchanged
# extension.
#
# release-please.yml dispatches this workflow when the NinjaCrawler.Companion
# package is released. release-please creates the release as a draft (draft: true
# in the config), so the git tag does not exist yet; this workflow packages the
# static extension ZIP, attaches it, and only then publishes — which finally
# creates the tag. Mirrors the draft->attach->publish dance in release.yml.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Companion release tag to publish (for example, companion-v0.3.2)
        required: true
        type: string
      sha:
        description: Commit SHA to build. Used when the tag does not exist yet (draft release).
        required: false
        type: string

permissions:
  contents: write
  actions: write
  pull-requests: write

concurrency:
  group: release-companion-${{ inputs.tag }}
  cancel-in-progress: false

jobs:
  release-companion:
    name: Build and publish Companion extension
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out release commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # Prefer the commit SHA (the tag may not exist yet for a draft release),
          # then the dispatch tag.
          ref: ${{ inputs.sha || inputs.tag }}

      - name: Validate Companion release version
        id: version
        shell: pwsh
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          if ($env:RELEASE_TAG -notmatch '^companion-v(?<version>\d+\.\d+\.\d+)$') {
            throw "Companion release tag '$env:RELEASE_TAG' must use the companion-vX.Y.Z format."
          }

          $version = $Matches.version
          $manifestVersion = (Get-Content NinjaCrawler.Companion/manifest.json -Raw | ConvertFrom-Json).version
          if ($manifestVersion -ne $version) {
            throw "NinjaCrawler.Companion/manifest.json has version '$manifestVersion', expected '$version'."
          }

          "tag=$env:RELEASE_TAG" >> $env:GITHUB_OUTPUT
          "version=$version" >> $env:GITHUB_OUTPUT

      - name: Package Companion asset
        shell: pwsh
        run: >
          pwsh -File Tools/Package-NinjaCrawlerRelease.ps1
          -Version ${{ steps.version.outputs.version }}
          -CompanionOnly

      - name: Publish GitHub Release
        id: publish_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          RELEASE_VERSION: ${{ steps.version.outputs.version }}
          RELEASE_SHA: ${{ inputs.sha || github.sha }}
        run: |
          $assets = @(Get-ChildItem release -File | ForEach-Object FullName)
          if ($assets.Count -eq 0) {
            throw "No Companion release assets were generated."
          }

          & gh release view $env:RELEASE_TAG *> $null
          if ($LASTEXITCODE -eq 0) {
            # A (draft) release already exists. Attach the ZIP first, then publish
            # it last so the tag and the visible release only appear once the asset
            # is in place.
            & gh release upload $env:RELEASE_TAG @assets --clobber
            if ($LASTEXITCODE -ne 0) {
              throw "Companion release asset upload failed."
            }

            $publishArgs = @(
              'release', 'edit', $env:RELEASE_TAG
              '--title', "NinjaCrawler Companion $env:RELEASE_VERSION"
              '--draft=false'
              '--prerelease=false'
            )
            & gh @publishArgs
          } else {
            # Fallback (for example a manual tag push with no pre-created release):
            # create it already published with the asset attached.
            $arguments = @(
              'release', 'create', $env:RELEASE_TAG
              '--target', $env:RELEASE_SHA
              '--title', "NinjaCrawler Companion $env:RELEASE_VERSION"
              '--notes', "NinjaCrawler Companion $env:RELEASE_VERSION"
            )
            $arguments += $assets
            & gh @arguments
          }
          if ($LASTEXITCODE -ne 0) {
            throw "Companion GitHub Release publication failed."
          }

      - name: Update README Companion download links
        if: ${{ steps.publish_release.outcome == 'success' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
          COMPANION_VERSION: ${{ steps.version.outputs.version }}
        run: |
          $branch = "automation/readme-companion-$env:RELEASE_TAG"
          git fetch origin main
          git switch --force-create $branch origin/main

          & Tools/Update-NinjaCrawlerReleaseReadme.ps1 -CompanionVersion $env:COMPANION_VERSION

          if (-not (git status --short -- README.md)) {
            Write-Host "README already points to Companion $env:COMPANION_VERSION."
            exit 0
          }

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "docs(readme): update Companion download links for $env:RELEASE_TAG"

          git config --local --unset-all http.https://github.com/.extraheader
          gh auth setup-git
          git push --force --set-upstream origin $branch

          $pr = gh pr list --repo ${{ github.repository }} --base main --head $branch `
            --state open --json number --jq '.[0].number'
          if (-not $pr) {
            gh pr create --repo ${{ github.repository }} --base main --head $branch `
              --title "docs(readme): update Companion download links for $env:RELEASE_TAG" `
              --body "Updates the README Companion download links after $env:RELEASE_TAG was published."
            if ($LASTEXITCODE -ne 0) {
              throw "Companion README update PR creation failed."
            }
            $pr = gh pr list --repo ${{ github.repository }} --base main --head $branch `
              --state open --json number --jq '.[0].number'
          }

          if (-not $pr) {
            throw "Could not resolve the Companion README update PR number."
          }

          $deadline = (Get-Date).AddMinutes(20)
          do {
            $checkData = gh pr view $pr --repo ${{ github.repository }} --json statusCheckRollup |
              ConvertFrom-Json
            $checks = @($checkData.statusCheckRollup)
            $failed = @(
              $checks | Where-Object {
                $_.status -eq 'COMPLETED' -and
                $_.conclusion -notin @('SUCCESS', 'SKIPPED', 'NEUTRAL')
              }
            )
            if ($failed.Count -gt 0) {
              $names = $failed | ForEach-Object name
              throw "Companion README update PR checks failed: $($names -join ', ')."
            }

            $pending = @($checks | Where-Object { $_.status -ne 'COMPLETED' })
            if ($checks.Count -gt 0 -and $pending.Count -eq 0) {
              break
            }
            if ((Get-Date) -ge $deadline) {
              throw "Timed out waiting for Companion README update PR checks."
            }

            Write-Host "Waiting for Companion README update PR checks..."
            Start-Sleep -Seconds 10
          } while ($true)

          $requiredChecks = @('Frontend quality', 'Windows cross-build')
          $completedNames = @($checks | ForEach-Object name)
          $missingChecks = @($requiredChecks | Where-Object { $_ -notin $completedNames })
          if ($missingChecks.Count -gt 0) {
            throw "Companion README update PR is missing required checks: $($missingChecks -join ', ')."
          }

          gh pr merge $pr --repo ${{ github.repository }} --squash --delete-branch `
            --subject "docs(readme): update Companion download links for $env:RELEASE_TAG" `
            --body "[skip ci]"
          if ($LASTEXITCODE -ne 0) {
            throw "Companion README update PR merge failed."
          }

      - name: Reconcile recovered Companion release PR label
        if: ${{ always() && inputs.sha != '' && steps.publish_release.outcome == 'success' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RELEASE_SHA: ${{ inputs.sha }}
        run: |
          $pending = gh pr list --repo ${{ github.repository }} --base main --state closed `
            --label 'autorelease: pending' --json number,mergeCommit `
            --jq ".[] | select(.mergeCommit.oid == `"$env:RELEASE_SHA`") | .number"
          foreach ($pr in @($pending)) {
            if ($pr) {
              gh pr edit $pr --repo ${{ github.repository }} `
                --remove-label 'autorelease: pending' `
                --add-label 'autorelease: tagged'
            }
          }

      - name: Re-anchor Companion release-please
        if: ${{ always() && steps.publish_release.outcome == 'success' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          # All package PRs edit .release-please-manifest.json. Once this tag is
          # published, every open release PR must be regenerated from the updated
          # main branch or sibling package PRs can conflict with this release.
          $stale = gh pr list --repo ${{ github.repository }} --base main --state open `
            --json number,headRefName `
            --jq '.[] | select(.headRefName | startswith("release-please--")) | .number'
          foreach ($pr in @($stale)) {
            if ($pr) {
              Write-Host "Closing stale release PR #$pr opened before the Companion tag existed."
              gh pr close $pr --repo ${{ github.repository }} `
                --comment "Superseded by the Companion release workflow after publishing ${{ steps.version.outputs.tag }}."
            }
          }
          gh workflow run release-please.yml --repo ${{ github.repository }} --ref main

      - name: Back-sync published Companion version to develop
        if: ${{ always() && steps.publish_release.outcome == 'success' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh workflow run release-back-sync.yml `
            --repo ${{ github.repository }} `
            --ref main `
            -f tag=${{ steps.version.outputs.tag }}

# temp-repo workflow registration (no-op)
