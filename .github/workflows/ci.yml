name: CI

on:
  pull_request:
    branches:
      - main
      - develop
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect CI impact
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      windows: ${{ steps.plan.outputs.windows }}
      reason: ${{ steps.plan.outputs.reason }}
      quality: ${{ steps.plan.outputs.quality }}
      quality_reuse: ${{ steps.plan.outputs.quality_reuse }}
      quality_reason: ${{ steps.plan.outputs.quality_reason }}

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Classify build and quality impact
        id: impact
        shell: pwsh
        env:
          EVENT_NAME: ${{ github.event_name }}
          HEAD_REF: ${{ github.head_ref }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          $result = & Tools/Get-CIBuildImpact.ps1 `
            -EventName $env:EVENT_NAME `
            -HeadRef $env:HEAD_REF `
            -BaseSha $env:BASE_SHA `
            -HeadSha $env:HEAD_SHA |
            ConvertFrom-Json
          $windows = $result.windowsBuild.ToString().ToLowerInvariant()
          $quality = $result.quality.ToString().ToLowerInvariant()
          "windows=$windows" >> $env:GITHUB_OUTPUT
          "quality=$quality" >> $env:GITHUB_OUTPUT
          "reason=$($result.reason)" >> $env:GITHUB_OUTPUT
          "quality_reason=$($result.qualityReason)" >> $env:GITHUB_OUTPUT
          Write-Host "Windows build required: $windows"
          Write-Host "Windows reason: $($result.reason)"
          Write-Host "Hosted quality required: $quality"
          Write-Host "Quality reason: $($result.qualityReason)"

      - name: Resolve reusable promotion validation
        id: plan
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
          HEAD_REF: ${{ github.head_ref }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          REPOSITORY: ${{ github.repository }}
          WINDOWS_REQUIRED: ${{ steps.impact.outputs.windows }}
          WINDOWS_REASON: ${{ steps.impact.outputs.reason }}
          QUALITY_REQUIRED: ${{ steps.impact.outputs.quality }}
          QUALITY_REASON: ${{ steps.impact.outputs.quality_reason }}
        run: |
          $qualityReuse = $false
          $windowsReuse = $false
          $qualityReason = $env:QUALITY_REASON
          $windowsReason = $env:WINDOWS_REASON

          $isPromotion =
            $env:EVENT_NAME -eq 'pull_request' -and
            $env:BASE_REF -eq 'main' -and
            $env:HEAD_REF -eq 'develop'

          if ($isPromotion) {
            $reuse = & Tools/Get-CIPromotionValidation.ps1 `
              -Repository $env:REPOSITORY `
              -HeadSha $env:HEAD_SHA |
              ConvertFrom-Json
            $qualityReuse = $reuse.qualityReuse
            $windowsReuse = $reuse.windowsReuse
            if ($qualityReuse) {
              $qualityReason = $reuse.reason
            } elseif ($env:QUALITY_REQUIRED -eq 'true') {
              $qualityReason = "$($reuse.reason) Running hosted quality fail-closed."
            }
            if ($windowsReuse) {
              $windowsReason = $reuse.reason
            } elseif ($env:WINDOWS_REQUIRED -eq 'true') {
              $windowsReason = "$($reuse.reason) Building fail-closed."
            }
          }

          $windowsRequired = $env:WINDOWS_REQUIRED -eq 'true' -and -not $windowsReuse
          $qualityRequired = $env:QUALITY_REQUIRED -eq 'true' -and -not $qualityReuse
          "quality=$($qualityRequired.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "quality_reuse=$($qualityReuse.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "quality_reason=$qualityReason" >> $env:GITHUB_OUTPUT
          "windows=$($windowsRequired.ToString().ToLowerInvariant())" >> $env:GITHUB_OUTPUT
          "reason=$windowsReason" >> $env:GITHUB_OUTPUT
          Write-Host "Hosted quality required: $qualityRequired"
          Write-Host "Hosted quality reuse: $qualityReuse"
          Write-Host "Quality reason: $qualityReason"
          Write-Host "Windows build required: $windowsRequired"
          Write-Host "Windows reason: $windowsReason"

  quality_execution:
    name: Frontend quality execution
    needs: changes
    if: ${{ needs.changes.outputs.quality == 'true' && needs.changes.outputs.quality_reuse != 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate Companion release candidate
        if: ${{ github.event_name == 'pull_request' && github.head_ref == 'release-please--branches--main--components--companion' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          $bodyPath = Join-Path $env:RUNNER_TEMP "companion-release-pr.md"
          gh pr view $env:PR_NUMBER --repo ${{ github.repository }} `
            --json body --jq '.body' | Set-Content -LiteralPath $bodyPath
          if ($LASTEXITCODE -ne 0) {
            throw "Could not read Companion release PR #$env:PR_NUMBER."
          }
          & Tools/Test-ReleaseCandidateIntegrity.ps1 `
            -PullRequestBodyPath $bodyPath `
            -RequireFunctionalChange

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate app version manifests
        shell: pwsh
        run: pwsh -File Tools/Test-NinjaCrawlerVersion.ps1

      - name: Run lint
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Test Companion release packaging
        shell: pwsh
        run: >
          pwsh
          -File Tools/Test-NinjaCrawlerReleasePackaging.ps1

      - name: Test CI input fingerprints
        shell: pwsh
        run: pwsh -File Tools/Test-CIInputFingerprint.ps1

      - name: Test release automation configuration
        shell: pwsh
        run: >
          pwsh
          -File Tools/Test-ReleaseAutomation.ps1

      - name: Test release candidate integrity
        shell: pwsh
        run: >
          pwsh
          -File Tools/Test-ReleaseCandidateIntegrity.Tests.ps1

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  quality_check:
    name: Frontend quality
    if: ${{ always() }}
    needs: [changes, quality_execution]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Report frontend validation decision
        shell: bash
        env:
          QUALITY_REQUIRED: ${{ needs.changes.outputs.quality }}
          QUALITY_REUSED: ${{ needs.changes.outputs.quality_reuse }}
          QUALITY_REASON: ${{ needs.changes.outputs.quality_reason }}
          QUALITY_RESULT: ${{ needs.quality_execution.result }}
        run: |
          set -euo pipefail
          echo "Hosted quality required: $QUALITY_REQUIRED"
          echo "Frontend quality reused: $QUALITY_REUSED"
          echo "Reason: $QUALITY_REASON"
          echo "Execution result: $QUALITY_RESULT"
          if [ "$QUALITY_REUSED" = "true" ]; then
            exit 0
          fi
          if [ "$QUALITY_REQUIRED" != "true" ]; then
            echo "Hosted quality skipped: no quality inputs changed."
            exit 0
          fi
          if [ "$QUALITY_RESULT" != "success" ]; then
            echo "Required hosted quality did not succeed." >&2
            exit 1
          fi

  windows-build:
    name: Windows cross-build execution
    needs: [changes, quality_check]
    if: ${{ needs.changes.outputs.windows == 'true' }}
    runs-on: ${{ fromJSON((github.event_name != 'pull_request' || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)) && '["self-hosted","proxmox-lxc","crossbuild","mode-ephemeral"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        if: ${{ github.event_name == 'pull_request' && !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm

      - name: Install cross-build toolchain
        if: ${{ github.event_name == 'pull_request' && !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            clang-18=1:18.1.3-1ubuntu1 \
            lld-18=1:18.1.3-1ubuntu1 \
            llvm-18=1:18.1.3-1ubuntu1 \
            nsis=3.09-4ubuntu1
          sudo ln -sf "$(command -v clang-18)" /usr/local/bin/clang-cl
          for tool in lld-link llvm-lib llvm-rc; do
            sudo ln -sf "$(command -v "${tool}-18")" "/usr/local/bin/${tool}"
            command -v "${tool}"
          done
          clang-18 --version
          makensis -VERSION
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add x86_64-pc-windows-msvc
          cargo install cargo-xwin --version 0.22.0 --locked

      - name: Cache Rust dependencies
        if: ${{ github.event_name == 'pull_request' && !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-xwin-linux-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-xwin-linux-

      - name: Verify self-hosted golden toolchain
        if: ${{ github.event_name != 'pull_request' || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) }}
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          rustc --version
          cargo-xwin --version
          clang-18 --version
          makensis -VERSION
          pwsh -NoLogo -NoProfile -Command '$PSVersionTable.PSVersion.ToString()'
          rustup target list --installed | grep -Fx 'x86_64-pc-windows-msvc'
          for tool in clang-cl lld-link llvm-lib llvm-rc llvm-readobj-18; do
            command -v "$tool"
          done
          echo 'CARGO_TARGET_DIR=/cache/target/ninjacrawler-ci' >> "$GITHUB_ENV"

      - name: Configure shared compiler cache
        if: ${{ github.event_name != 'pull_request' || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) }}
        shell: bash
        run: |
          set -euo pipefail
          if command -v sccache >/dev/null; then
            echo "RUSTC_WRAPPER=$(command -v sccache)" >> "$GITHUB_ENV"
            echo 'SCCACHE_DIR=/cache/sccache/ninjacrawler' >> "$GITHUB_ENV"
            sccache --show-stats
          else
            echo '::notice::sccache is not installed in the golden image; using the workflow-specific Cargo target cache.'
          fi

      - name: Install dependencies
        run: npm ci

      - name: Build portable Release
        shell: pwsh
        run: >
          pwsh -File Tools/Build-NinjaCrawler.ps1
          -Configuration Release
          -SkipLint
          -SkipTests
          -PortableOnly

      - name: Stage versioned portable
        id: portable
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $name = "NinjaCrawler-$version-windows-x64-portable.exe"
          $targetRoot = if ([string]::IsNullOrWhiteSpace($env:CARGO_TARGET_DIR)) {
            Join-Path $PWD "src-tauri/target"
          } else {
            $env:CARGO_TARGET_DIR
          }
          $source = Join-Path $targetRoot "x86_64-pc-windows-msvc/release/ninjacrawler.exe"
          $destination = Join-Path $env:RUNNER_TEMP $name
          Copy-Item -LiteralPath $source -Destination $destination
          "name=$name" >> $env:GITHUB_OUTPUT
          "path=$destination" >> $env:GITHUB_OUTPUT

      - name: Upload portable build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.portable.outputs.name }}
          path: ${{ steps.portable.outputs.path }}
          if-no-files-found: error
          retention-days: 7

  windows-check:
    name: Windows cross-build
    if: ${{ always() }}
    needs: [changes, windows-build]
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Report Windows build decision
        shell: bash
        env:
          BUILD_REQUIRED: ${{ needs.changes.outputs.windows }}
          BUILD_REASON: ${{ needs.changes.outputs.reason }}
          BUILD_RESULT: ${{ needs.windows-build.result }}
        run: |
          set -euo pipefail
          echo "Windows build required: $BUILD_REQUIRED"
          echo "Reason: $BUILD_REASON"
          echo "Execution result: $BUILD_RESULT"
          if [ "$BUILD_REQUIRED" = "true" ] && [ "$BUILD_RESULT" != "success" ]; then
            echo "The required Windows cross-build did not succeed." >&2
            exit 1
          fi
