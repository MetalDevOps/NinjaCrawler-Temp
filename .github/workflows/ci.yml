name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality:
    name: Frontend quality
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate Companion release candidate
        if: ${{ github.event_name == 'pull_request' && github.head_ref == 'release-please--branches--main--components--companion' }}
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          $bodyPath = Join-Path $env:RUNNER_TEMP "companion-release-pr.md"
          gh pr view $env:PR_NUMBER --repo ${{ github.repository }} `
            --json body --jq '.body' | Set-Content -LiteralPath $bodyPath
          if ($LASTEXITCODE -ne 0) {
            throw "Could not read Companion release PR #$env:PR_NUMBER."
          }
          & Tools/Test-ReleaseCandidateIntegrity.ps1 `
            -PullRequestBodyPath $bodyPath `
            -RequireFunctionalChange

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate app version manifests
        shell: pwsh
        run: pwsh -File Tools/Test-NinjaCrawlerVersion.ps1

      - name: Run lint
        run: npm run lint

      - name: Run frontend tests
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Test Companion release packaging
        shell: pwsh
        run: >
          pwsh
          -File Tools/Test-NinjaCrawlerReleasePackaging.ps1

      - name: Test release automation configuration
        shell: pwsh
        run: >
          pwsh
          -File Tools/Test-ReleaseAutomation.ps1

      - name: Test release candidate integrity
        shell: pwsh
        run: >
          pwsh
          -File Tools/Test-ReleaseCandidateIntegrity.Tests.ps1

      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  windows-build:
    name: Windows cross-build
    if: ${{ github.event_name == 'pull_request' || github.ref == 'refs/heads/main' }}
    runs-on: ${{ fromJSON((github.event_name != 'pull_request' || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association)) && '["self-hosted","proxmox-lxc","crossbuild","mode-ephemeral"]' || '["ubuntu-latest"]') }}
    timeout-minutes: 45

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node.js
        if: ${{ github.event_name == 'pull_request' && !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install cross-build toolchain
        if: ${{ github.event_name == 'pull_request' && !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) }}
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends \
            clang-18=1:18.1.3-1ubuntu1 \
            lld-18=1:18.1.3-1ubuntu1 \
            llvm-18=1:18.1.3-1ubuntu1 \
            nsis=3.09-4ubuntu1
          sudo ln -sf "$(command -v clang-18)" /usr/local/bin/clang-cl
          for tool in lld-link llvm-lib llvm-rc; do
            sudo ln -sf "$(command -v "${tool}-18")" "/usr/local/bin/${tool}"
            command -v "${tool}"
          done
          clang-18 --version
          makensis -VERSION
          rustup toolchain install stable --profile minimal --no-self-update
          rustup default stable
          rustup target add x86_64-pc-windows-msvc
          cargo install cargo-xwin --version 0.22.0 --locked

      - name: Cache Rust dependencies
        if: ${{ github.event_name == 'pull_request' && !contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) }}
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: cargo-xwin-linux-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: cargo-xwin-linux-

      - name: Verify self-hosted golden toolchain
        if: ${{ github.event_name != 'pull_request' || contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.pull_request.author_association) }}
        shell: bash
        run: |
          set -euo pipefail
          node --version
          npm --version
          rustc --version
          cargo-xwin --version
          clang-18 --version
          makensis -VERSION
          pwsh -NoLogo -NoProfile -Command '$PSVersionTable.PSVersion.ToString()'
          rustup target list --installed | grep -Fx 'x86_64-pc-windows-msvc'
          for tool in clang-cl lld-link llvm-lib llvm-rc llvm-readobj-18; do
            command -v "$tool"
          done
          echo 'CARGO_TARGET_DIR=/cache/target/ninjacrawler-ci' >> "$GITHUB_ENV"

      - name: Install dependencies
        run: npm ci

      - name: Build portable Release
        shell: pwsh
        run: >
          pwsh -File Tools/Build-NinjaCrawler.ps1
          -Configuration Release
          -SkipLint
          -SkipTests
          -PortableOnly

      - name: Stage versioned portable
        id: portable
        shell: pwsh
        run: |
          $version = (Get-Content src-tauri/tauri.conf.json -Raw | ConvertFrom-Json).version
          $name = "NinjaCrawler-$version-windows-x64-portable.exe"
          $targetRoot = if ([string]::IsNullOrWhiteSpace($env:CARGO_TARGET_DIR)) {
            Join-Path $PWD "src-tauri/target"
          } else {
            $env:CARGO_TARGET_DIR
          }
          $source = Join-Path $targetRoot "x86_64-pc-windows-msvc/release/ninjacrawler.exe"
          $destination = Join-Path $env:RUNNER_TEMP $name
          Copy-Item -LiteralPath $source -Destination $destination
          "name=$name" >> $env:GITHUB_OUTPUT
          "path=$destination" >> $env:GITHUB_OUTPUT

      - name: Upload portable build
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ steps.portable.outputs.name }}
          path: ${{ steps.portable.outputs.path }}
          if-no-files-found: error
          retention-days: 7
