<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NinjaCrawler Companion</title>
    <link rel="stylesheet" href="src/popup.css" />
  </head>
  <body>
    <main class="shell">
      <header class="header">
        <div>
          <h1>NinjaCrawler Companion</h1>
          <p id="profileSummary" class="summary">Loading...</p>
        </div>
        <span id="statusPill" class="status neutral">...</span>
      </header>

      <section id="unsupportedPanel" class="panel hidden">
        <h2>Unsupported Tab</h2>
        <p class="muted">Open a supported profile tab.</p>
      </section>

      <section id="offlinePanel" class="panel hidden">
        <h2>Desktop Offline</h2>
        <p class="muted">Start NinjaCrawler and keep it running.</p>
      </section>

      <form id="profileForm" class="panel active-panel hidden">
        <div class="section-heading">
          <div>
            <h2>Active tab</h2>
            <p id="activeTabMeta" class="muted"></p>
          </div>
        </div>

        <div id="existingBanner" class="banner hidden">
          <strong>Already added</strong>
          <span id="existingMeta"></span>
        </div>

        <div class="actions">
          <button id="targetButton" type="button" class="secondary hidden">Download selected story</button>
          <button id="singleVideoButton" type="button" class="secondary hidden">Save as single video</button>
          <button id="syncButton" type="button" class="hidden">Sync profile</button>
          <button id="addButton" type="button" class="primary">Add in NinjaCrawler</button>
          <button id="importAccountButton" type="button">Import account</button>
        </div>

        <p id="message" class="message" aria-live="polite"></p>
      </form>

      <section id="accountImportPanel" class="panel hidden">
        <div>
          <h2>Import account</h2>
          <p id="accountImportSummary" class="muted"></p>
          <p id="accountImportFields" class="muted"></p>
        </div>
        <label class="field">
          Destination
          <select id="accountDestination"></select>
        </label>
        <label id="newAccountNameField" class="field">
          Account name
          <input id="newAccountName" type="text" autocomplete="off">
        </label>
        <div class="actions inline-actions">
          <button id="confirmAccountImport" type="button" class="primary">Import</button>
          <button id="cancelAccountImport" type="button">Cancel</button>
        </div>
        <p id="accountImportMessage" class="message" aria-live="polite"></p>
      </section>

      <section id="profilesPanel" class="panel profiles-panel hidden">
        <div class="section-heading">
          <div>
            <h2>Open profile tabs</h2>
            <p id="profilesMeta" class="muted"></p>
          </div>
          <button id="selectAllButton" type="button" class="link-button">Select all</button>
        </div>
        <div id="profilesLoading" class="loading-row hidden" role="status" aria-live="polite">
          <span class="spinner" aria-hidden="true"></span>
          <span id="profilesLoadingText">Checking profiles in NinjaCrawler…</span>
        </div>
        <div id="profilesList" class="profile-list"></div>
        <div id="batchActions" class="actions">
          <button id="addSelectedButton" type="button" class="primary" disabled>Add selected profiles</button>
        </div>
        <p id="batchMessage" class="message" aria-live="polite"></p>
      </section>
    </main>

    <script type="module" src="src/popup.js"></script>
  </body>
</html>
